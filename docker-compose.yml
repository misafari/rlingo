services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: rlingo-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://tms:tms@db:5432/tms?sslmode=disable
    depends_on:
      - db

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: rlingo-web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
  postgres:
    image: postgres:16-alpine
    container_name: rlingo-postgres
    environment:
      POSTGRES_USER: tms
      POSTGRES_PASSWORD: tms
      POSTGRES_DB: tms
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tms"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

